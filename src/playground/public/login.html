<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>NanoClaw Playground — Login</title>
  <link rel="stylesheet" href="static/style.css" />
</head>
<body class="login-body">
  <form id="login-form" class="login-box">
    <h1>Agent Playground</h1>
    <p>Enter the shared password to continue.</p>
    <input type="password" name="password" id="password" autofocus autocomplete="current-password" />
    <button type="submit">Enter</button>
    <div id="login-error" class="error"></div>
  </form>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const res = await fetch('api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      if (res.ok) {
        // "./" at /login resolves to /  (direct), at /playground/login
        // resolves to /playground/. Works for both.
        window.location.href = './';
      } else {
        document.getElementById('login-error').textContent = 'Invalid password.';
      }
    });
  </script>
</body>
</html>
